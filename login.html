<!DOCTYPE html>
<html lang="ar">
<head>

  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    
    body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0f172a;
    color:white;
    }
    
    .card{
    background:#1e293b;
    padding:40px;
    border-radius:12px;
    text-align:center;
    width:300px;
    }
    
    button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    }
    
    .google{
    background:#4285F4;
    color:white;
    }
  
  </style>

</head>

<body>

  <div class="card">
  
    <h2>تسجيل الدخول</h2>
    
    <button class="google" onclick="loginWithGoogle()">
      تسجيل الدخول عبر Google
    </button>
  
  </div>
  
  <script>
    
    const supabaseUrl = "PUT_YOUR_SUPABASE_URL"
    const supabaseKey = "PUT_YOUR_SUPABASE_KEY"
    
    const supabase = window.supabase.createClient(supabaseUrl,supabaseKey)
    
    async function loginWithGoogle(){
    
      await supabase.auth.signInWithOAuth({
        provider:'google',
        options:{
          redirectTo:'https://schedule-maker-hti.vercel.app'
        }
      })
      
    }
  
  </script>

</body>
</html>
